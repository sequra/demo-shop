services:
  app:
    build:
      context: .
      dockerfile: docker/common/Dockerfile-app
      args:
        COMPOSER_AUTH: ${COMPOSER_AUTH}
    volumes:
      - ./src/backend:/var/www/html
    env_file:
      - ./src/backend/.env
    expose:
      - "9000"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8081:8080"
    volumes:
      - ./src/backend/public:/var/www/html/public
      - ./docker/ecs/nginx.conf.template:/etc/nginx/templates/default.conf.template
    environment:
      PHP_FPM_HOST: app
    depends_on:
      - app

  frontend:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./src/frontend:/app
      - ./src/backend/public:/backend-public
    command: ["npx", "vite", "build", "--watch"]
    profiles:
      - dev
