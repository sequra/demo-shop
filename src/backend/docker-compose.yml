services:
  sequra_demo_shop:
    build: .
    ports:
      - "8081:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/var/www/html/backend
      - ../frontend:/var/www/html/frontend
      - ./xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    working_dir: /var/www/html/backend
